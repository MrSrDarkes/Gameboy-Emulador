<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Boy Advance Emulator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%23333' width='32' height='32' rx='4'/><rect fill='%231a1' x='6' y='8' width='20' height='14' rx='1'/><rect fill='%23333' x='8' y='10' width='16' height='10'/><circle fill='%23667eea' cx='12' cy='15' r='1.5'/><circle fill='%23667eea' cx='20' cy='15' r='1.5'/></svg>" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Contenedor principal -->
    <div class="emulator-container">
        <!-- GBA Device con imagen de fondo -->
        <div class="gba-device">
            <!-- Canvas para el juego -->
            <canvas id="gameCanvas" class="game-canvas" width="240" height="160"></canvas>

            <!-- D-Pad (izquierda) -->
            <div class="d-pad">
                <button class="d-pad-btn d-pad-up" data-key="arrowup" title="Arriba"></button>
                <button class="d-pad-btn d-pad-down" data-key="arrowdown" title="Abajo"></button>
                <button class="d-pad-btn d-pad-left" data-key="arrowleft" title="Izquierda"></button>
                <button class="d-pad-btn d-pad-right" data-key="arrowright" title="Derecha"></button>
            </div>

            <!-- Botones A, B, L, R (derecha/arriba) -->
            <div class="action-buttons">
                <button class="btn btn-a" data-key="z" title="Botón A">A</button>
                <button class="btn btn-b" data-key="x" title="Botón B">B</button>
            </div>


            <!-- Start y Select (abajo centro) -->
            <div class="control-buttons">
                <button class="btn btn-select" data-key="backspace" title="Select">SELECT</button>
                <button class="btn btn-start" data-key="enter" title="Start">START</button>
            </div>

            <!-- LED de encendido (estado de emulación) -->
            <div id="powerLed" class="power-led off" title="Power"></div>

            <!-- Botón Power (arriba derecha) -->
            <button class="btn btn-power" id="powerBtn" title="Encendido/Apagado">●</button>

            <!-- Control de volumen (integrado) -->
            <div class="volume-control">
                <button class="volume-mute" id="muteBtn" title="Silenciar">🔊</button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
            </div>

        </div>

        <!-- Panel de control simplificado (solo carga de ROM y controles básicos) -->
        <div class="control-panel">
            <div class="panel-left">
                <input type="file" id="romInput" accept=".gba,.nds" style="display:none;">
                <button id="loadRomBtn" class="btn-primary">📥 Cargar ROM</button>
                <span id="gameTitle" class="game-title">Sin juego</span>
            </div>

            <div class="panel-right">
                <button id="pauseBtn" class="btn-secondary" disabled>⏸ Pausa</button>
                <button id="resumeBtn" class="btn-secondary" disabled>▶ Reanudar</button>
                <button id="fullscreenBtn" class="btn-secondary">⛶ Fullscreen</button>
            </div>
        </div>

        <!-- ROMs guardados e incluidos -->
        <div class="roms-section">
            <div class="saved-roms-panel">
                <h3 class="saved-roms-title">Tus ROMs guardados</h3>
                <div id="savedRomsList" class="saved-roms-list"></div>
            </div>
            <div class="saved-roms-panel">
                <h3 class="saved-roms-title">Juegos incluidos</h3>
                <div id="includedRomsList" class="saved-roms-list"></div>
            </div>
        </div>

        <!-- Ajustes (shader + threads) -->
        <div class="settings-panel">
            <div class="settings-row">
                <label class="settings-label" for="shaderSelect">Shader de video</label>
                <select id="shaderSelect" class="settings-select">
                    <option value="disabled">Sin shader</option>
                    <option value="default">Por defecto</option>
                </select>
            </div>
            <div class="settings-row">
                <label class="settings-check-label">
                    <input type="checkbox" id="optThreads" checked>
                    Usar hilos (mejor rendimiento en algunos núcleos)
                </label>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Controlador principal -->
    <script src="emulator.js"></script>
    
    <!-- EmulatorJS Loader (carga automáticamente todos los componentes) -->
    <!-- Nota: Se carga dinámicamente cuando se carga una ROM -->
    <!-- window.EJS_pathtodata apunta a: ./data/ -->
</body>
</html>
